<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleek — Create Invoice</title>
    <meta name="description" content="Free invoice generator by Sleek. Create a professional Singapore invoice or bill clients worldwide in minutes. PDF download, no signup. GST, multi-country support." />
    <meta property="og:title" content="Sleek — Free Invoice Generator" />
    <meta property="og:description" content="Create professional invoices in minutes. Auto-calculated totals, 10+ countries, instant PDF — no account required to download." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_SG" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      crossorigin
    />
    <script type="text/javascript">
      document.addEventListener("DOMContentLoaded", function () {
        document.addEventListener(
          "click",
          function (e) {
            const btn = e.target.closest("#download-invoice-pdf-button");
            if (!btn) return;
            const isDisabled =
              btn.disabled === true ||
              btn.hasAttribute("disabled") ||
              btn.getAttribute("aria-disabled") === "true";
            if (isDisabled) return;
            window.parent.postMessage(
              { event: "SG_CTA_Tool_Invoice_Generator_Active_Download_1" },
              "*",
            );
          },
          true,
        );
        document.addEventListener(
          "click",
          function (e) {
            const btn = e.target.closest("#send-invoice-email-button");
            if (!btn) return;
            const isDisabled =
              btn.disabled === true ||
              btn.hasAttribute("disabled") ||
              btn.getAttribute("aria-disabled") === "true";
            if (isDisabled) return;
            window.parent.postMessage(
              { event: "SG_CTA_Tool_Invoice_Generator_Active_SendEmail_1" },
              "*",
            );
          },
          true,
        );
      });
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="sleek-invoice-app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
