<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Sleek — Create Invoice</title>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        document.addEventListener('click', function (e) {
          const btn = e.target.closest('#download-invoice-pdf-button')
          if (!btn) return

          const isDisabled =
            btn.disabled === true ||
            btn.hasAttribute('disabled') ||
            btn.getAttribute('aria-disabled') === 'true' ||
            window.getComputedStyle(btn).pointerEvents === 'none'

          if (
            !isDisabled &&
            typeof fireEvent === 'function'
          ) {
            alert('fireEvent')
            fireEvent('SG_CTA_Tool_Invoice_Generator_Active_Download_1')
          }
        })
      })
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="sleek-invoice-app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
